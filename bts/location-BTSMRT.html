<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS LED | CHRISLEE.STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Bebas Neue', 'Prompt', sans-serif; }

        .video-container-wrapper { position: relative; width: 100%; }
        .image-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
        }
        
        /* ปรับกรอบรูปให้เหมาะกับแนวตั้งของจอ BTS */
        .work-item { 
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 9 / 16; 
        }

        video::-webkit-media-controls-volume-slider,
        video::-webkit-media-controls-mute-button {
            display: none !important;
        }
    </style>
</head>
<body class="bg-[#121212]"> 
    <nav class="navbar-glass sticky top-0 z-50 text-white">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <h1 class="serif-title text-3xl font-bold italic"><a href="../index.html">CHRISLEE.STUDIO</a></h1>
            <div class="emoji-nav">
                <a href="../index.html" class="emoji-link"><span>🏠</span><span class="emoji-label">Home</span></a>
                <a href="../categories.html" class="emoji-link"><span>📍</span><span class="emoji-label">Jobs</span></a>
                <a href="../contact.html" class="emoji-link"><span>📩</span><span class="emoji-label">Contact</span></a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <a href="../categories.html" class="text-slate-500 hover:text-[#FF85B3] transition-colors mb-8 inline-block">← Back to Locations</a>
        
        <header class="mb-12">
            <h2 class="serif-title text-6xl mb-2 italic text-white">BTS LED</h2>
            <p class="text-[#FF85B3] uppercase tracking-[0.3em] text-sm font-bold">Featured Work</p>
        </header>

        <div class="video-container-wrapper mb-12 flex justify-center">
            <div class="work-item relative rounded-[3rem] overflow-hidden border-4 border-white/5 shadow-2xl bg-black">
                <img src="powerbankning.jpg" alt="BTS LED Work" class="w-full h-full object-cover">
            </div>
        </div>

        <div class="mt-20">
            <h3 class="serif-title text-3xl mb-8 italic text-white border-l-4 border-[#FF85B3] pl-6">Service Rates</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-[#1E1E1E] p-8 rounded-[2.5rem] border-4 border-white/5 text-center transition-all hover:border-[#FF85B3]/30">
                    <p class="text-[10px] text-[#FF85B3] font-black uppercase mb-1">LED VIDEO</p>
                    <p class="text-4xl font-bold text-white">450฿</p>
                    <p class="text-[10px] text-slate-500 mt-2">PHOTO+VIDEO 600฿</p>
                </div>

                <div class="bg-[#1E1E1E] p-8 rounded-[2.5rem] border-4 border-white/5 text-center transition-all hover:border-[#FF85B3]/30">
                    <p class="text-[10px] text-slate-400 font-black uppercase mb-1">TUKTUK / VINYL / STANDEE</p>
                    <p class="text-4xl font-bold text-white">200฿</p>
                </div>

                <div class="bg-[#1E1E1E] p-8 rounded-[2.5rem] border-4 border-white/5 text-center transition-all hover:border-[#FF85B3]/30">
                    <p class="text-[10px] text-slate-400 font-black uppercase mb-1">LOLLIPOP / BUS / FENCE</p>
                    <p class="text-4xl font-bold text-white">400฿</p>
                </div>

                <div class="bg-[#1E1E1E] p-8 rounded-[2.5rem] border-4 border-white/5 text-center transition-all hover:border-[#FF85B3]/30">
                    <p class="text-[10px] text-[#FF85B3] font-black uppercase mb-1">RESIZE (PER SCREEN)</p>
                    <p class="text-4xl font-bold text-white">150฿</p>
                    <p class="text-[10px] text-slate-500 mt-2 italic">FLAT RATE</p>
                </div>
            </div>

            <div class="mt-12 text-center">
                <p class="text-slate-500 text-sm italic opacity-60">* OTHER MEDIA OR CAFE EVENT, PLEASE CONTACT DIRECTLY.</p>
                <p class="text-[#FF85B3] font-bold mt-2 tracking-[0.2em] text-xs">CONTACT ME</p>
            </div>
        </div>
    </main>
</body>
</html>
