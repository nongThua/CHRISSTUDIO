<body>
    <nav class="navbar-glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <h1 class="serif-title text-3xl font-bold italic"><a href="index.html">CHRISLEE.STUDIO</a></h1>
            <div class="emoji-nav">
                <a href="index.html" class="emoji-link"><span>🏠</span><span class="emoji-label">Home</span></a>
                <a href="categories.html" class="emoji-link"><span>📍</span><span class="emoji-label">Jobs</span></a>
                <a href="contact.html" class="emoji-link"><span>📩</span><span class="emoji-label">Contact</span></a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <header class="mb-16">
            <a href="categories.html" class="text-[#0EA5E9] font-bold text-xs uppercase mb-4 inline-block">← Back to Categories</a>
            <h2 class="serif-title text-5xl mb-4 italic">LED / Billboard</h2>
            <p class="text-slate-400">ผลงานออกแบบจอ Digital (วิดีโอจะเล่นอัตโนมัติเมื่อเลื่อนมาเห็น)</p>
        </header>

        <section class="mb-24">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-8 w-1 bg-[#0EA5E9] rounded-full"></div>
                <h3 class="serif-title text-3xl italic">MBK Center - Mega LED</h3>
            </div>
            
            <div class="grid grid-cols-1 gap-6">
                <div class="w-full aspect-video bg-black rounded-[40px] overflow-hidden shadow-2xl border-4 border-white">
                    <video loop muted playsinline class="video-autoplay w-full h-full object-contain">
                        <source src="mbk-work.mp4" type="video/mp4">
                    </video>
                </div>
                
                <div class="flex justify-between items-center px-4">
                    <span class="text-xs font-bold uppercase text-slate-400 tracking-widest">Artist Birthday Ads</span>
                    <span class="font-bold text-[#0EA5E9] text-2xl">500฿</span>
                </div>
            </div>
        </section>

        <section class="mb-24">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-8 w-1 bg-[#0EA5E9] rounded-full"></div>
                <h3 class="serif-title text-3xl italic">Other Location - Test</h3>
            </div>
            
            <div class="w-full aspect-video bg-black rounded-[40px] overflow-hidden shadow-2xl border-4 border-white">
                <video loop muted playsinline class="video-autoplay w-full h-full object-contain">
                    <source src="mbk-work.mp4" type="video/mp4">
                </video>
            </div>
        </section>

    </main>

    <script>
        const observerOptions = {
            threshold: 0.3 // เลื่อนมาเห็น 30% ถึงเริ่มเล่น
        };

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    // เล่นคลิปเมื่อเลื่อนมาเห็น
                    video.play().catch(e => console.log("Auto-play started"));
                } else {
                    // หยุดคลิปเมื่อเลื่อนพ้นสายตา
                    video.pause();
                }
            });
        }, observerOptions);

        // สั่งให้เริ่มตรวจจับวิดีโอทุกตัวที่มี class "video-autoplay"
        document.querySelectorAll('.video-autoplay').forEach((vdo) => {
            videoObserver.observe(vdo);
        });
    </script>

    <footer class="footer">

    </footer>
</body>
