<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTS & MRT | CHRISLEE.STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar-glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <h1 class="serif-title text-3xl font-bold italic"><a href="index.html">CHRISLEE.STUDIO</a></h1>
            <div class="emoji-nav">
                <a href="index.html" class="emoji-link"><span>🏠</span><span class="emoji-label">Home</span></a>
                <a href="categories.html" class="emoji-link"><span>📍</span><span class="emoji-label">Jobs</span></a>
                <a href="contact.html" class="emoji-link"><span>📩</span><span class="emoji-label">Contact</span></a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20">
        <a href="categories.html" class="text-[#0EA5E9] font-bold text-xs uppercase mb-8 inline-block hover:underline">← Back to Locations</a>
        
        <header class="mb-10">
            <h2 class="serif-title text-6xl mb-2 italic">BTS & MRT</h2>
            <p class="text-slate-400">เลื่อนแถบวิดีโอเพื่อชมผลงานบนสถานีต่างๆ</p>
        </header>

        <div class="rounded-[3rem] overflow-hidden border-[6px] border-white shadow-2xl bg-black aspect-video mb-12">
            <video controls loop muted playsinline class="video-autoplay w-full h-full object-cover">
                <source src="bts-mrt-work.mp4" type="video/mp4">
            </video>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-10 rounded-[2.5rem] border-4 border-white shadow-sm text-center">
                <p class="text-[10px] text-[#0EA5E9] font-black uppercase tracking-widest mb-1">LED Screen</p>
                <p class="text-4xl font-bold">400฿</p>
            </div>
            <div class="bg-white p-10 rounded-[2.5rem] border-4 border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Static Box</p>
                <p class="text-4xl font-bold">400฿</p>
            </div>
            <div class="bg-white p-10 rounded-[2.5rem] border-4 border-white shadow-sm text-center">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Resize Fee</p>
                <p class="text-2xl font-bold">+150฿ / จอ</p>
            </div>
        </div>
    </main>

    <footer class="footer py-10 text-center">
        <p class="serif-title italic text-slate-300">© 2026 CHRISLEE.STUDIO</p>
    </footer>

    <script>
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.play();
                else entry.target.pause();
            });
        }, { threshold: 0.3 });
        document.querySelectorAll('.video-autoplay').forEach((vdo) => videoObserver.observe(vdo));
    </script>
</body>
</html>
