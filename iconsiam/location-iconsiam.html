    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Bebas Neue', 'Prompt', sans-serif; box-sizing: border-box; }

        .video-container-wrapper { 
            position: relative; 
            width: 100%;
            margin-bottom: 2rem;
        }
        
        /* 1. จอวิดีโอปรับให้เหลี่ยมขึ้น (1rem) */
        .video-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -ms-overflow-style: none; 
            scrollbar-width: none;
            width: 100%;
            border-radius: 1rem; 
            background: transparent;
            gap: 1rem; /* เพิ่ม gap เล็กน้อยเพื่อให้ดูมีมิติ */
        }
        .video-slider::-webkit-scrollbar { display: none; }
        
        .video-item { 
            flex: 0 0 100%; 
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-radius: 1rem;
            overflow: hidden;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 133, 179, 0.95);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            border: none;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .nav-arrow:hover { background: #FF85B3; scale: 1.1; }
        
        .arrow-left { left: -22px; }
        .arrow-right { right: -22px; }

        /* 2. วิดีโอเหลี่ยมขึ้น (1rem) */
        video, img { 
            width: 100%;
            height: auto; 
            display: block;
            border-radius: 1rem; 
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (max-width: 768px) {
            .arrow-left { left: 5px; }
            .arrow-right { right: 5px; }
            video, img, .video-slider, .video-item { border-radius: 0.75rem; }
            .nav-arrow { width: 35px; height: 35px; font-size: 16px; }
        }
    </style>
</head>
<body class="bg-[#121212] text-white"> 
    <nav class="navbar-glass sticky top-0 z-50">

    <script>
        // แก้ไข Logic การเลื่อนให้แม่นยำ (เหมือนหน้า MBK และ Impact)
        function slideMedia(sliderId, direction) {
            const slider = document.getElementById(sliderId);
            const items = slider.querySelectorAll('.video-item');
            if (items.length === 0) return;

            const itemWidth = items[0].offsetWidth;
            const gap = parseInt(window.getComputedStyle(slider).gap) || 0;
            const scrollStep = itemWidth + gap;

            if (direction === 'left') {
                slider.scrollBy({ left: -scrollStep, behavior: 'smooth' });
            } else {
                slider.scrollBy({ left: scrollStep, behavior: 'smooth' });
            }
        }

        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play().catch(e => {});
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.6 });

        document.querySelectorAll('.video-autoplay').forEach((vdo) => {
            videoObserver.observe(vdo);
        });
    </script>
